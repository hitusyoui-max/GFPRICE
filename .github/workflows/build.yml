name: Build Android APK
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILD_LOGS: yes
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install Buildozer dependencies (minimal)
      run: |
        sudo apt-get update
        sudo apt-get install -y             build-essential             git             python3             python3-dev             python3-venv             libffi-dev             libssl-dev             zlib1g-dev             autoconf             libtool             pkg-config             ncurses-dev             cmake             ccache             openjdk-17-jdk             unzip             wget             curl
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*
    
    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install --upgrade buildozer cython
    
    - name: Cache Buildozer (cache Android NDK/SDK)
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          .buildozer_cache
        key: ${{ runner.os }}-buildozer-android-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-android-
    
    - name: Configure buildozer for network stability
      run: |
        # 修改buildozer配置增加超时时间
        mkdir -p ~/.buildozer
        echo '[app]' > ~/.buildozer/buildozer.conf
        echo 'network.timeout = 300' >> ~/.buildozer/buildozer.conf
        echo 'network.retry = 3' >> ~/.buildozer/buildozer.conf
    
    - name: Build APK
      run: |
        # 增加超时时间，重试下载
        buildozer android debug
      continue-on-error: false
      timeout-minutes: 60
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: bin/*.apk
        retention-days: 30
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: bin/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
